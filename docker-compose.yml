services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - db
    restart: unless-stopped

  worker:
    build: .
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    env_file: .env
    depends_on:
      - redis
      - db
    restart: unless-stopped

  scheduler:
    build: .
    command: php artisan schedule:work
    env_file: .env
    depends_on:
      - redis
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: poe2prices
      POSTGRES_USER: poe2
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:

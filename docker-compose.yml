services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - db_data:/app/database
    restart: unless-stopped

  worker:
    build: .
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    env_file: .env
    depends_on:
      - redis
    volumes:
      - db_data:/app/database
    restart: unless-stopped

  scheduler:
    build: .
    command: php artisan schedule:work
    env_file: .env
    depends_on:
      - redis
    volumes:
      - db_data:/app/database
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  db_data:
  redis_data:

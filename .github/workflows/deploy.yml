name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'tests/**'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload deploy script
        run: scp deploy/deploy.sh root@${{ secrets.SERVER_HOST }}:/tmp/poe2-deploy.sh

      - name: Deploy
        run: ssh root@${{ secrets.SERVER_HOST }} 'chmod +x /tmp/poe2-deploy.sh && /tmp/poe2-deploy.sh && rm /tmp/poe2-deploy.sh'
